<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Oscars Admin</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<h1>Admin Control Panel</h1>

<div class="admin-box">
  <label>Category</label>
  <select id="categorySelect"></select>

  <label>Winner</label>
  <select id="nomineeSelect"></select>

  <button onclick="setWinner()">Set Winner</button>
</div>

<script>
const socket = io();

let categoriesData = {};

socket.on("INIT", data => {
  categoriesData = data.categories;
  populateCategories();
});

function populateCategories() {
  const categorySelect = document.getElementById("categorySelect");
  categorySelect.innerHTML = "";

  Object.keys(categoriesData).forEach(category => {
    const option = document.createElement("option");
    option.value = category;
    option.textContent = category;
    categorySelect.appendChild(option);
  });

  populateNominees();
}

function populateNominees() {
  const category = document.getElementById("categorySelect").value;
  const nomineeSelect = document.getElementById("nomineeSelect");

  nomineeSelect.innerHTML = "";

  if (!categoriesData[category]) return;

  categoriesData[category].nominees.forEach(nominee => {
    const option = document.createElement("option");
    option.value = nominee;
    option.textContent = nominee;
    nomineeSelect.appendChild(option);
  });
}

document.getElementById("categorySelect").addEventListener("change", populateNominees);

async function setWinner() {
  const category = document.getElementById("categorySelect").value;
  const nominee = document.getElementById("nomineeSelect").value;

  await fetch("/winner", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin": "oscars2025"
    },
    body: JSON.stringify({ category, nominee })
  });

  alert("Winner announced!");
}
</script>

</body>
</html>
