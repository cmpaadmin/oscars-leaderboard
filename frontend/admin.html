<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Control</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>

<body class="admin-body">

<div class="admin-container">
  <h1 class="admin-title">Admin Control Panel</h1>
  <div id="categories"></div>
</div>

<script>

const socket = io();
let categoriesData = {};

socket.on("INIT", data => {
  categoriesData = data.categories;
  buildCategories();
});

function buildCategories(){

  const container = document.getElementById("categories");
  container.innerHTML = "";

  Object.keys(categoriesData).forEach(category => {

    const row = document.createElement("div");
    row.className = "category-row";

    const label = document.createElement("div");
    label.className = "category-label";
    label.innerText = category;

    const select = document.createElement("select");
    select.className = "winner-select";

    categoriesData[category].nominees.forEach(nominee=>{
      const option = document.createElement("option");
      option.value = nominee;
      option.textContent = nominee;
      select.appendChild(option);
    });

   const button = document.createElement("button");
button.className = "winner-button";
button.innerText = "Set Winner";
button.dataset.category = category;

button.onclick = async () => {

console.log("Button clicked");

const response = await fetch("/winner",{
  method:"POST",
  headers:{
    "Content-Type":"application/json",
    "x-admin":"oscars2025"
  },
  body:JSON.stringify({
    category: category,
    nominee: select.value
  })
});

console.log("Winner sent:",category,select.value);
console.log("Server response:",response.status);

};

const response = await fetch("https://oscars-leaderboard-1.onrender.com/winner",{
  method:"POST",
  headers:{
    "Content-Type":"application/json",
    "x-admin":"f1!msk00lF$U"
  },
  body:JSON.stringify({
    category: category,
    nominee: select.value
  })
});

console.log("Winner sent:",category,select.value);
console.log("Server response:",response.status);

button.innerText = "Winner Selected";
button.classList.add("winner-chosen");
row.classList.add("category-complete");

};

  button.innerText = "Winner Selected";
  button.classList.add("winner-chosen");

  row.classList.add("category-complete");

};

    row.appendChild(label);
    row.appendChild(select);
    row.appendChild(button);

    container.appendChild(row);

  });

}

</script>

</body>
</html>
