<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Oscars Display</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>
<h1>Oscars Leaderboard</h1>
<div id="leaderboard"></div>
<div class="bottom-images">
<img src="images/left.png">
<img class="center" src="images/center.png">
<img src="images/right.png">
</div>
  <div id="winnerOverlay" class="overlay hidden">
  <div class="overlay-content">
    <h2 id="overlayCategory"></h2>
    <p><strong>Winner:</strong> <span id="overlayWinner"></span></p>
    <p><strong>Most Chosen:</strong> <span id="overlayMost"></span></p>
  </div>
</div>

<canvas id="confettiCanvas"></canvas>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
const socket = io();

socket.on("LEADERBOARD", data=>{
  const div=document.getElementById("leaderboard");
  div.innerHTML="";
  data.forEach(p=>{
    if(!p.name) return;
    div.innerHTML+=`<div class="entry">${p.name} — ${p.score}</div>`;
  });
});

socket.on("WINNER", data=>{
  showOverlay(data);
  launchConfetti();
});

function showOverlay(data){
  const overlay = document.getElementById("winnerOverlay");

  document.getElementById("overlayCategory").innerText = data.category;
  document.getElementById("overlayWinner").innerText = data.winner;
  document.getElementById("overlayMost").innerText = data.mostChosen || "N/A";

  overlay.classList.remove("hidden");
  overlay.classList.add("fade-in");

  setTimeout(()=>{
    overlay.classList.remove("fade-in");
    overlay.classList.add("fade-out");

    setTimeout(()=>{
      overlay.classList.add("hidden");
      overlay.classList.remove("fade-out");
    },1000);

  },10000);
}

function launchConfetti(){
  confetti({
    particleCount: 200,
    spread: 120,
    origin: { y: 0.6 }
  });
}
</script>
</body>
</html>
