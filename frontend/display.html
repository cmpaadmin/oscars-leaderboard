<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Oscars Leaderboard</title>

<link rel="stylesheet" href="style.css">

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>


<body>

<div id="leaderboard">

<div id="tabulatingMessage" class="tabulating">
VOTES ARE BEING TABULATED<span id="dots"></span>
</div>

</div>


<!-- Winner Popup -->

<div id="winnerOverlay" class="overlay hidden">

<div class="overlay-content">

<h2 id="overlayCategory"></h2>

<p>Winner: <span id="overlayWinner"></span></p>

<p>Most Chosen: <span id="overlayMost"></span></p>

</div>

</div>

<script>

const socket = io();
console.log("Display connected to socket");
  
socket.on("LEADERBOARD", data => {

console.log("Leaderboard received:", data);

console.log("Leaderboard data:", data);

const div = document.getElementById("leaderboard");
let dotCount = 0;



/* animated dots */

setInterval(() => {

const dots = document.getElementById("dots");

if(!dots) return;

dotCount = (dotCount + 1) % 4;

dots.innerText = ".".repeat(dotCount);

},500);




/* leaderboard update */

socket.on("LEADERBOARD", data => {

const div = document.getElementById("leaderboard");

if(!data || data.length === 0) return;



data.sort((a,b)=>b.score-a.score);



const top5 = data.slice(0,5);



/* if everyone has zero score keep tabulating message */

const noWinnersYet = top5.every(p => p.score === 0);

if(noWinnersYet) return;



/* remove tabulating message */

const tab = document.getElementById("tabulatingMessage");

if(tab) tab.remove();



div.innerHTML = "";



top5.forEach((p,index)=>{

if(!p.name) return;



div.innerHTML += `

<div class="entry">

<span class="rank">#${index+1}</span>

<span class="name">${p.name}</span>

<span class="score">${p.score}</span>

</div>

`;

});

});




/* winner event */

socket.on("WINNER", data=>{

const tab = document.getElementById("tabulatingMessage");

if(tab) tab.remove();



showOverlay(data);

launchConfetti();

});




function showOverlay(data){

const overlay = document.getElementById("winnerOverlay");



document.getElementById("overlayCategory").innerText = data.category;

document.getElementById("overlayWinner").innerText = data.winner;

document.getElementById("overlayMost").innerText = data.mostChosen || "N/A";



overlay.classList.remove("hidden");

overlay.classList.add("fade-in");



setTimeout(()=>{

overlay.classList.remove("fade-in");

overlay.classList.add("fade-out");



setTimeout(()=>{

overlay.classList.add("hidden");

overlay.classList.remove("fade-out");

},1000);



},10000);

}



function launchConfetti(){

confetti({

particleCount:250,

spread:130,

origin:{y:0.6}

});

}

</script>


</body>
</html>
