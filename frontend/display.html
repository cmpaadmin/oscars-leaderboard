<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Oscars Leaderboard</title>

<style>

body{
background-image:url("/images/background.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

color:gold;
font-family:Arial;
text-align:center;
overflow:hidden;
margin:0;
}

#leaderboard{
margin-top:120px;
font-size:48px;
}

.entry{
margin:10px;
}

.rank{
margin-right:20px;
}

#tabulatingMessage{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
}

#winnerOverlay{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
z-index:1000;
display:none;
}

.overlay-content{
background:black;
border:4px solid gold;
padding:40px;
border-radius:10px;
font-size:40px;
box-shadow:0 0 30px gold;
}

</style>

</head>

<body>

<div id="tabulatingMessage">
VOTES ARE BEING TABULATED<span id="dots"></span>
</div>

<div id="leaderboard"></div>

<div id="winnerOverlay">
<div class="overlay-content">
<div id="overlayCategory"></div>
<div>Winner: <span id="overlayWinner"></span></div>
<div>Most Chosen: <span id="overlayMost"></span></div>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const socket = io();

let dotCount=0;

/* animated dots */

setInterval(()=>{

const dots=document.getElementById("dots");

dotCount=(dotCount+1)%4;

dots.innerText=".".repeat(dotCount);

},500);



socket.on("LEADERBOARD",(payload)=>{

if(!payload.started) return;

const data = payload.data;

const tab = document.getElementById("tabulatingMessage");

if(tab) tab.remove();

const div = document.getElementById("leaderboard");

div.innerHTML="";

if(!data || data.length===0) return;

data.sort((a,b)=>b.score-a.score);

const top5 = data.slice(0,5);

top5.forEach((p,index)=>{

div.innerHTML += `
<div class="entry">
<span class="rank">#${index+1}</span>
<span>${p.name}</span>
<span> ${p.score}</span>
</div>
`;

});

});



socket.on("WINNER",(data)=>{

showOverlay(data);

launchConfetti();

});



socket.on("RESET",()=>{

location.reload();

});



function showOverlay(data){

const overlay = document.getElementById("winnerOverlay");

document.getElementById("overlayCategory").innerText = data.category;
document.getElementById("overlayWinner").innerText = data.winner;
document.getElementById("overlayMost").innerText = data.mostChosen || "N/A";

overlay.style.display="block";

setTimeout(()=>{

overlay.style.display="none";

},10000);

}



function launchConfetti(){

confetti({
particleCount:300,
spread:140,
origin:{y:0.6},
zIndex:9999
});

}

</script>

</body>
</html>
