<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Oscars Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="tabulatingMessage">
  VOTES ARE BEING TABULATED<span id="dots"></span>
</div>

<div id="winnerTicker" style="display:none;">
  <div class="ticker-header">Tonight's Winners</div>
  <div class="ticker-window">
    <div id="winnerTickerTrack"></div>
  </div>
</div>

<div id="leaderboard"></div>

<div id="leaderboardTicker" style="display:none;">
  <div class="ticker-header">Full Leaderboard</div>
  <div class="ticker-window">
    <div id="leaderboardTickerTrack"></div>
  </div>
</div>

<div id="winnerOverlay">
  <div class="overlay-content" id="overlayContent">
    <div id="overlayTopGroup">
      <div id="overlayCategory"></div>

      <div class="overlay-section-title">Winner</div>
      <div id="overlayWinner"></div>
    </div>

    <div id="overlayBottomGroup">
      <div class="overlay-section-title">Most Chosen</div>
      <div id="overlayMost"></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const socket = io();

let currentWinners = {};
let currentLeaderboard = [];

let scrollIntervals = {};
let lastWinnerHTML = "";
let lastLeaderboardHTML = "";

/* ---------------- TABULATING DOTS ---------------- */

let dotCount = 0;
setInterval(()=>{
  const d = document.getElementById("dots");
  if(!d) return;
  dotCount = (dotCount+1)%4;
  d.textContent=".".repeat(dotCount);
},500);


/* ---------------- SOCKET EVENTS ---------------- */

socket.on("INIT",(payload)=>{
  currentWinners = payload.winners || {};
  currentLeaderboard = payload.leaderboard || [];
  updateUI();
});

socket.on("LEADERBOARD",(payload)=>{
  currentLeaderboard = payload.data || [];
  updateUI();
});

socket.on("WINNER",(data)=>{

  const cat = data.category.replace(/\s+\(TIE!\)$/,"");

  currentWinners[cat] = Array.isArray(data.winners)
    ? data.winners
    : [data.winner];

  updateUI();
  showOverlay(data);
});

socket.on("UNDO_WINNER",(data)=>{
  const cat = data.category.replace(/\s+\(TIE!\)$/,"");
  delete currentWinners[cat];
  updateUI();
});

socket.on("RESET",()=>{
  currentWinners = {};
  currentLeaderboard = [];
  stopAllScroll();
  updateUI();
});


/* ---------------- MASTER UI ---------------- */

function updateUI(){

  const started = Object.keys(currentWinners).length > 0;

  const tab = document.getElementById("tabulatingMessage");
  const board = document.getElementById("leaderboard");

  if(!started){
    tab.style.display = "block";
    board.innerHTML = "";
  } else {
    tab.style.display = "none";
    renderLeaderboard();
  }

  document.getElementById("winnerTicker").style.display = started ? "block" : "none";
  document.getElementById("leaderboardTicker").style.display = started ? "block" : "none";

  if(started){
    renderWinnerTicker();
    renderLeaderboardTicker();
  }
}


/* ---------------- CENTER LEADERBOARD ---------------- */

function renderLeaderboard(){

  const div = document.getElementById("leaderboard");
  if(!div) return;

  div.innerHTML = "";

  const data = currentLeaderboard;
  if(!data || data.length === 0) return;

  /* group by score */
  const grouped = {};
  data.forEach(p=>{
    if(!grouped[p.score]) grouped[p.score] = [];
    grouped[p.score].push(p.name);
  });

  /* sort scores high → low */
  const scores = Object.keys(grouped)
    .map(Number)
    .sort((a,b)=>b-a);

  let rank = 1;
  let visibleLines = 0;
  const maxLines = 5;

  scores.forEach(score=>{

    if(visibleLines >= maxLines) return;

    const players = grouped[score];

    /* CASE 1: 4+ tied → collapse */
    if(players.length > 3){

      div.innerHTML += `
        <div class="entry">
          <span class="rank">#${rank}</span>
          <span>${players.length} people tied</span>
          <span> ${score}</span>
        </div>
      `;

      visibleLines += 1;

    }

    /* CASE 2: 1–3 tied → list individually SAME rank */
    else{

      players.forEach((name, index)=>{

        if(visibleLines >= maxLines) return;

        div.innerHTML += `
          <div class="entry tie-line ${index>0 ? "tie-subline":""}">
            <span class="rank">${index===0 ? "#" + rank : ""}</span>
            <span>${name}</span>
            <span> ${score}</span>
          </div>
        `;

        visibleLines += 1;

      });

    }

    /* advance rank correctly */
    rank += players.length;

  });
}


/* ---------------- SCROLL ENGINE ---------------- */

function startScroll(track,id){

  stopScroll(id);

  let pos = 0;

  scrollIntervals[id] = setInterval(()=>{
    pos += 0.5;

    if(pos >= track.scrollHeight/2){
      pos = 0;
    }

    track.style.transform = `translateY(-${pos}px)`;

  },20);
}

function stopScroll(id){
  if(scrollIntervals[id]){
    clearInterval(scrollIntervals[id]);
  }
}

function stopAllScroll(){
  Object.keys(scrollIntervals).forEach(stopScroll);
}


/* ---------------- LEFT TICKER ---------------- */

function renderWinnerTicker(){

  const track = document.getElementById("winnerTickerTrack");
  const cats = Object.keys(currentWinners);

  if(cats.length === 0){
    track.innerHTML="";
    stopScroll("left");
    return;
  }

  const html = cats.map(cat=>{
    const winners = currentWinners[cat]||[];

    return `
      <div class="ticker-item">
        <div class="ticker-category">${cat}</div>
        ${winners.map(w=>`<div class="ticker-winner">${w}</div>`).join("")}
      </div>
    `;
  }).join("");

  if(html === lastWinnerHTML) return;

  lastWinnerHTML = html;

  track.innerHTML = html + html;

  startScroll(track,"left");
}


/* ---------------- RIGHT TICKER ---------------- */

function renderLeaderboardTicker(){

  const track = document.getElementById("leaderboardTickerTrack");

  if(!currentLeaderboard.length){
    track.innerHTML="";
    stopScroll("right");
    return;
  }

  const html = currentLeaderboard.map((p,i)=>`
    <div class="ticker-item">
      <div class="ticker-line">
        <span>#${i+1}</span>
        <span>${p.name}</span>
        <span>${p.score}</span>
      </div>
    </div>
  `).join("");

  if(html === lastLeaderboardHTML) return;

  lastLeaderboardHTML = html;

  track.innerHTML = html + html;

  startScroll(track,"right");
}


/* ---------------- WINNER POPUP ---------------- */

function showOverlay(data){

  const overlay = document.getElementById("winnerOverlay");

  document.getElementById("overlayCategory").textContent = data.category;

  const winners = Array.isArray(data.winners)
    ? data.winners
    : [data.winner];

  document.getElementById("overlayWinner").innerHTML =
    winners.map(w=>`<div>${w}</div>`).join("");

  document.getElementById("overlayMost").textContent =
    data.mostChosen || "N/A";

  overlay.style.display = "block";

  requestAnimationFrame(()=>{
    fitOverlayText(); // 🔥 THIS IS THE KEY
  });

  launchConfetti();

  setTimeout(()=>{
    overlay.style.display = "none";
  },10000);
}


/* ---------------- CONFETTI ---------------- */

function launchConfetti(){

  const end = Date.now() + 10000;

  (function frame(){
    confetti({
      particleCount:6,
      angle:60,
      spread:70,
      origin:{x:0},
      zIndex:9999
    });

    confetti({
      particleCount:6,
      angle:120,
      spread:70,
      origin:{x:1},
      zIndex:9999
    });

    if(Date.now() < end){
      requestAnimationFrame(frame);
    }
  })();
}

  function fitOverlayText(){

  const box = document.getElementById("overlayContent");
  const category = document.getElementById("overlayCategory");
  const winner = document.getElementById("overlayWinner");
  const most = document.getElementById("overlayMost");

  if(!box || !category || !winner || !most) return;

  const elements = [category, winner, most];

  /* reset sizes */
  elements.forEach(el=>{
    el.style.fontSize = "20px";
    el.style.lineHeight = "1.1";
  });

  let size = 20;
  let maxSize = 300;

  while(size < maxSize){

    elements.forEach(el=>{
      el.style.fontSize = size + "px";
    });

    if(box.scrollHeight > box.clientHeight * 0.92){
      size--;
      elements.forEach(el=>{
        el.style.fontSize = size + "px";
      });
      break;
    }

    size += 2;
  }
}
</script>

</body>
</html>
