<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="leaderboard"></div>

<!-- Winner Popup -->
<div id="winnerOverlay" class="overlay hidden">
  <div class="overlay-content">
    <h2 id="overlayCategory"></h2>
    <p>Winner: <span id="overlayWinner"></span></p>
    <p>Most Chosen: <span id="overlayMost"></span></p>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const socket = io();

socket.on("LEADERBOARD", data => {

  const div = document.getElementById("leaderboard");
  div.innerHTML = "";

  if(!data || data.length === 0){
    div.innerHTML = `<div class="tabulating">VOTES ARE BEING TABULATED</div>`;
    return;
  }

  // Check if all scores are zero (no winners yet)
  const noWinnersYet = data.every(p => p.score === 0);

  if(noWinnersYet){
    div.innerHTML = `<div class="tabulating">VOTES ARE BEING TABULATED</div>`;
    return;
  }

  data.sort((a,b)=>b.score-a.score);

  const top5 = data.slice(0,5);

  top5.forEach((p,index)=>{

    if(!p.name) return;

    div.innerHTML += `
      <div class="entry">
        <span class="rank">#${index+1}</span>
        <span class="name">${p.name}</span>
        <span class="score">${p.score}</span>
      </div>
    `;

  });

    div.innerHTML += `<div class="entry">${text}</div>`;
  });
});

  clean.forEach((p,index)=>{
    div.innerHTML+=`
      <div class="entry">
        <span class="rank">#${index+1}</span>
        <span class="name">${p.name}</span>
        <span class="score">${p.score}</span>
      </div>
    `;
  });
});

socket.on("WINNER", data=>{
  showOverlay(data);
  launchConfetti();
});

function showOverlay(data){
  const overlay = document.getElementById("winnerOverlay");

  document.getElementById("overlayCategory").innerText = data.category;
  document.getElementById("overlayWinner").innerText = data.winner;
  document.getElementById("overlayMost").innerText = data.mostChosen || "N/A";

  overlay.classList.remove("hidden");
  overlay.classList.add("fade-in");

  setTimeout(()=>{
    overlay.classList.remove("fade-in");
    overlay.classList.add("fade-out");

    setTimeout(()=>{
      overlay.classList.add("hidden");
      overlay.classList.remove("fade-out");
    },1000);

  },10000);
}

function launchConfetti(){
  confetti({
    particleCount: 250,
    spread: 130,
    origin: { y: 0.6 }
  });
}


</script>
<div class="bottom-images">
  <img src="images/left.png">
  <img class="center" src="images/center.png">
  <img src="images/right.png">
</div>
</body>
</html>
