<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Oscars Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="tabulatingMessage">
    VOTES ARE BEING TABULATED<span id="dots"></span>
  </div>

  <div id="winnerTicker">
    <div class="ticker-header">Tonight's Winners</div>
    <div class="ticker-window">
      <div id="winnerTickerTrack"></div>
    </div>
  </div>

  <div id="leaderboard"></div>

  <div id="leaderboardTicker">
    <div class="ticker-header">Full Leaderboard</div>
    <div class="ticker-window">
      <div id="leaderboardTickerTrack"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>

  <script>
    const socket = io();
    let currentWinners = {};
    let currentLeaderboard = [];

    socket.on("INIT", (payload) => {
      currentWinners = payload.winners || {};
      currentLeaderboard = payload.leaderboard || [];

      renderWinnerTicker();
      renderLeaderboardTicker(currentLeaderboard, true);
    });

    socket.on("LEADERBOARD", (payload) => {
      currentLeaderboard = payload.data || [];
      renderLeaderboardTicker(currentLeaderboard, payload.started);
    });

    socket.on("WINNER", (data) => {
      const cat = data.category.replace(/\s+\(TIE!\)$/, "");
      currentWinners[cat] = Array.isArray(data.winners)
        ? data.winners
        : [data.winner];

      renderWinnerTicker();
    });

    socket.on("UNDO_WINNER", (data) => {
      const cat = data.category.replace(/\s+\(TIE!\)$/, "");
      delete currentWinners[cat];
      renderWinnerTicker();
    });

    socket.on("RESET", () => {
      currentWinners = {};
      currentLeaderboard = [];
      renderWinnerTicker();
      renderLeaderboardTicker([], false);
    });

    /* ------------------ FIXED ANIMATION ------------------ */

    function applyTickerAnimation(track) {
      if (!track) return;

      track.style.animation = "none";
      void track.offsetHeight;

      const fullHeight = track.scrollHeight / 2;

      track.style.setProperty("--scroll-distance", fullHeight + "px");

      const speed = 40;
      const duration = fullHeight / speed;

      track.style.animation = `tickerScroll ${duration}s linear infinite`;
    }

    /* ------------------ LEFT TICKER ------------------ */

    function renderWinnerTicker() {
      const track = document.getElementById("winnerTickerTrack");

      const categories = Object.keys(currentWinners);

      if (categories.length === 0) {
        track.innerHTML = "";
        track.style.animation = "none";
        return;
      }

      const singleSet = categories.map((cat) => {
        const winners = currentWinners[cat] || [];
        return `
          <div class="ticker-item">
            <div class="ticker-category">${cat}</div>
            ${winners.map(w => `<div class="ticker-winner">${w}</div>`).join("")}
          </div>
        `;
      }).join("");

      track.innerHTML = singleSet + singleSet;

      applyTickerAnimation(track);
    }

    /* ------------------ RIGHT TICKER ------------------ */

    function renderLeaderboardTicker(data, started) {
      const track = document.getElementById("leaderboardTickerTrack");

      if (!started || !data.length) {
        track.innerHTML = "";
        track.style.animation = "none";
        return;
      }

      const singleSet = data.map((p, i) => `
        <div class="ticker-item">
          <div class="ticker-line">
            <span class="ticker-rank">#${i + 1}</span>
            <span class="ticker-name">${p.name}</span>
            <span class="ticker-points">${p.score}</span>
          </div>
        </div>
      `).join("");

      track.innerHTML = singleSet + singleSet;

      applyTickerAnimation(track);
    }
  </script>
</body>
</html>
