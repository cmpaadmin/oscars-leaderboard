<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Oscars Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="tabulatingMessage">
  VOTES ARE BEING TABULATED<span id="dots"></span>
</div>

<!-- LEFT TICKER -->
<div id="winnerTicker">
  <div class="ticker-header">Tonight's Winners</div>
  <div class="ticker-scroll">
    <div id="winnerTickerTrack" class="ticker-track"></div>
  </div>
</div>

<!-- CENTER -->
<div id="leaderboard"></div>

<!-- RIGHT TICKER -->
<div id="leaderboardTicker">
  <div class="ticker-header">Full Leaderboard</div>
  <div class="ticker-scroll">
    <div id="leaderboardTickerTrack" class="ticker-track"></div>
  </div>
</div>

<!-- POPUP -->
<div id="winnerOverlay">
  <div class="overlay-content" id="overlayContent">

    <div id="overlayCategory"></div>

    <div class="overlay-section-title">Winner</div>
    <div id="overlayWinner"></div>

    <div class="overlay-section-title">Most Chosen</div>
    <div id="overlayMost"></div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const socket = io();

let currentWinners = {};
let currentLeaderboard = [];

let scrollIntervals = {};
let lastLeaderboardHTML = "";

/* ---------------- TABULATING DOTS ---------------- */

let dotCount = 0;
setInterval(()=>{
  const d = document.getElementById("dots");
  if(!d) return;
  dotCount = (dotCount+1)%4;
  d.textContent=".".repeat(dotCount);
},500);


/* ---------------- SOCKET EVENTS ---------------- */

socket.on("INIT",(payload)=>{
  currentWinners = payload.winners || {};
  currentLeaderboard = payload.leaderboard || [];
  updateUI();
});

socket.on("LEADERBOARD",(payload)=>{
  currentLeaderboard = payload.data || [];
  updateUI();
});

socket.on("WINNER",(data)=>{
  const cat = data.category.replace(/\s+\(TIE!\)$/,"");

  currentWinners[cat] = Array.isArray(data.winners)
    ? data.winners
    : [data.winner];

  updateUI();
  showOverlay(data);
});

socket.on("UNDO_WINNER",(data)=>{
  const cat = data.category.replace(/\s+\(TIE!\)$/,"");
  delete currentWinners[cat];
  updateUI();
});

socket.on("RESET",()=>{
  currentWinners = {};
  currentLeaderboard = [];
  stopAllScroll();
  updateUI();
});


/* ---------------- MASTER UI ---------------- */

function updateUI(){

  const started = Object.keys(currentWinners).length > 0;

  const tab = document.getElementById("tabulatingMessage");
  const board = document.getElementById("leaderboard");

  if(!started){
    tab.style.display = "block";
    board.innerHTML = "";
  } else {
    tab.style.display = "none";
    renderLeaderboard();
  }

  document.getElementById("winnerTicker").style.display = started ? "block" : "none";
  document.getElementById("leaderboardTicker").style.display = started ? "block" : "none";

  if(started){
    renderWinnerTicker();
    renderLeaderboardTicker();
  }
}


/* ---------------- CENTER LEADERBOARD ---------------- */

function renderLeaderboard(){

  const div = document.getElementById("leaderboard");
  if(!div) return;

  div.innerHTML = "";

  const grouped = {};
  currentLeaderboard.forEach(p=>{
    if(!grouped[p.score]) grouped[p.score] = [];
    grouped[p.score].push(p.name);
  });

  const scores = Object.keys(grouped)
    .map(Number)
    .sort((a,b)=>b-a);

  let rank = 1;
  let lines = 0;

  scores.forEach(score=>{
    if(lines >= 5) return;

    const players = grouped[score];

    if(players.length > 3){
      div.innerHTML += `
        <div class="entry">
          <span class="rank">#${rank}</span>
          <span>${players.length} people tied</span>
          <span> ${score}</span>
        </div>
      `;
      lines++;
    } else {
      players.forEach((name,i)=>{
        if(lines >= 5) return;

        div.innerHTML += `
          <div class="entry tie-line ${i>0 ? "tie-subline":""}">
            <span class="rank">${i===0 ? "#"+rank : ""}</span>
            <span>${name}</span>
            <span> ${score}</span>
          </div>
        `;
        lines++;
      });
    }

    rank += players.length;
  });
}


/* ---------------- SCROLL ENGINE ---------------- */

function startScroll(track,id){

  stopScroll(id);

  let pos = 0;

  scrollIntervals[id] = setInterval(()=>{
    pos += 0.4;

    if(pos >= track.scrollHeight/2){
      pos = 0;
    }

    track.style.transform = `translateY(-${pos}px)`;

  },20);
}

function stopScroll(id){
  if(scrollIntervals[id]){
    clearInterval(scrollIntervals[id]);
  }
}

function stopAllScroll(){
  Object.keys(scrollIntervals).forEach(stopScroll);
}


/* ---------------- LEFT TICKER ---------------- */

function renderWinnerTicker(){

  const track = document.getElementById("winnerTickerTrack");

  const html = Object.keys(currentWinners).map(category=>{

    const winners = currentWinners[category];

    return `
      <div class="ticker-item">
        <div class="ticker-category">${category}</div>
        ${winners.map(w=>`<div class="ticker-winner">${w}</div>`).join("")}
      </div>
    `;

  }).join("");

  track.innerHTML = html + html;
  startScroll(track,"left");
}


/* ---------------- RIGHT TICKER ---------------- */

function renderLeaderboardTicker(){

  const track = document.getElementById("leaderboardTickerTrack");

  const html = currentLeaderboard.map((p,i)=>`
    <div class="lb-row">
      <span>#${i+1}</span>
      <span>${p.name}</span>
      <span>${p.score}</span>
    </div>
  `).join("");

  if(html === lastLeaderboardHTML) return;

  lastLeaderboardHTML = html;

  track.innerHTML = html + html;
  startScroll(track,"right");
}


/* ---------------- POPUP (FINAL FIX) ---------------- */

function showOverlay(data){

  const overlay = document.getElementById("winnerOverlay");

  const categoryEl = document.getElementById("overlayCategory");
  const winnerEl = document.getElementById("overlayWinner");
  const mostEl = document.getElementById("overlayMost");

  categoryEl.textContent = data?.category || "";

  let winners = [];

  if(Array.isArray(data?.winners) && data.winners.length){
    winners = data.winners;
  } else if(data?.winner){
    winners = [data.winner];
  }

  winnerEl.innerHTML = winners.length
    ? winners.map(w => `<div class="winner-line">${w}</div>`).join("")
    : `<div class="winner-line">No Winner</div>`;

  mostEl.textContent = data?.mostChosen || "N/A";

  overlay.style.display = "block";

  setTimeout(()=>{
    fitOverlayText();
  },150);

  launchConfetti();

  setTimeout(()=>{
    overlay.style.display = "none";
  },10000);
}


/* ---------------- CONFETTI ---------------- */

function launchConfetti(){

  const end = Date.now() + 10000;

  (function frame(){
    confetti({particleCount:6,angle:60,spread:70,origin:{x:0}});
    confetti({particleCount:6,angle:120,spread:70,origin:{x:1}});

    if(Date.now() < end){
      requestAnimationFrame(frame);
    }
  })();
}


/* ---------------- TEXT SCALING ---------------- */

function fitOverlayText(){

  const box = document.getElementById("overlayContent");
  const category = document.getElementById("overlayCategory");
  const winner = document.getElementById("overlayWinner");
  const most = document.getElementById("overlayMost");

  let size = 120;
  let guard = 0;

  while(size > 20 && guard < 200){

    category.style.fontSize = (size * 0.6) + "px";
    winner.style.fontSize = size + "px";
    most.style.fontSize = (size * 0.6) + "px";

    winner.querySelectorAll(".winner-line").forEach(el=>{
      el.style.fontSize = size + "px";
      el.style.display = "block";
    });

    if(box.scrollHeight <= box.clientHeight * 0.95){
      break;
    }

    size -= 4;
    guard++;
  }
}
</script>

</body>
</html>
