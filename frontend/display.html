<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Oscars Leaderboard</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div id="tabulatingMessage">
VOTES ARE BEING TABULATED<span id="dots"></span>
</div>

<div id="leaderboard"></div>

<div id="winnerOverlay">
<div class="overlay-content">

<div id="overlayCategory"></div>

<div>
Winner: <span id="overlayWinner"></span>
</div>

<div>
Most Chosen: <span id="overlayMost"></span>
</div>

</div>
</div>


<script src="/socket.io/socket.io.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>


<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const socket = io();

let dotCount = 0;

/* TABULATING DOTS */

setInterval(() => {

const dots = document.getElementById("dots");

if(!dots) return;

dotCount = (dotCount + 1) % 4;

dots.innerText = ".".repeat(dotCount);

},500);



/* LEADERBOARD UPDATE */

socket.on("LEADERBOARD",(payload)=>{

if(!payload || !payload.started) return;

const data = payload.data || [];

const tab = document.getElementById("tabulatingMessage");
if(tab) tab.style.display = "none";

const div = document.getElementById("leaderboard");
div.innerHTML = "";

if(data.length === 0) return;


/* do not show leaderboard until someone has points */

const maxScore = Math.max(...data.map(p => p.score));

if(maxScore === 0) return;


/* hide tabulating screen */

const tab = document.getElementById("tabulatingMessage");

if(tab) tab.style.display = "none";


const div = document.getElementById("leaderboard");

div.innerHTML = "";


/* group ties */

const grouped = {};

data.forEach(player => {

if(!grouped[player.score]) grouped[player.score] = [];

grouped[player.score].push(player.name);

});


const scores = Object.keys(grouped)
.map(Number)
.sort((a,b)=>b-a);


let rank = 1;

scores.forEach(score => {

const players = grouped[score];

if(rank > 5) return;


/* many tied */

if(players.length > 3){

const leaderClass = rank === 1 ? "entry leader" : "entry";

div.innerHTML += `
<div class="${leaderClass}">
<span class="rank">#${rank}</span>
<span>${players.length} people tied</span>
<span> ${score}</span>
</div>
`;

rank++;

}


/* few tied */

else{

players.forEach(name => {

if(rank <= 5){

const leaderClass = rank === 1 ? "entry leader" : "entry";

div.innerHTML += `
<div class="${leaderClass}">
<span class="rank">#${rank}</span>
<span>${name}</span>
<span> ${score}</span>
</div>
`;

rank++;

}

});

}

});

});



/* WINNER POPUP */

socket.on("WINNER",(data)=>{

showOverlay(data);

launchConfetti();

});



/* RESET */

socket.on("RESET",()=>{

location.reload();

});



/* POPUP */

function showOverlay(data){

const overlay = document.getElementById("winnerOverlay");

document.getElementById("overlayCategory").innerText = data.category;

document.getElementById("overlayWinner").innerText = data.winner;

document.getElementById("overlayMost").innerText = data.mostChosen || "N/A";

overlay.style.display = "block";

setTimeout(()=>{

overlay.style.display = "none";

},10000);

}



/* CONTINUOUS CONFETTI */

function launchConfetti(){

const duration = 10000;

const end = Date.now() + duration;

(function frame(){

confetti({
particleCount:6,
angle:60,
spread:70,
origin:{x:0},
zIndex:9999
});

confetti({
particleCount:6,
angle:120,
spread:70,
origin:{x:1},
zIndex:9999
});

if(Date.now() < end){
requestAnimationFrame(frame);
}

})();

}

</script>

</body>
</html>
