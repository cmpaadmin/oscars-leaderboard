<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="leaderboard"></div>

<!-- Winner Popup -->
<div id="winnerOverlay" class="overlay hidden">
  <div class="overlay-content">
    <h2 id="overlayCategory"></h2>
    <p>Winner: <span id="overlayWinner"></span></p>
    <p>Most Chosen: <span id="overlayMost"></span></p>
  </div>
</div>

<!-- Font Size Controls (hidden but usable) -->
<div class="controls">
  <button onclick="changeSize(1)">A+</button>
  <button onclick="changeSize(-1)">A-</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const socket = io();
let fontScale = 1;

const socket = io();
let fontScale = 1;

socket.on("LEADERBOARD", data=>{
  const div = document.getElementById("leaderboard");
  div.innerHTML = "";

  if(!data || data.length === 0){
    div.innerHTML = `<div class="entry">Waiting for picks...</div>`;
    return;
  }

  // Sort highest score first
  data.sort((a,b)=>b.score-a.score);

  // Determine top 5 positions with tie logic
  let display = [];
  let i = 0;

  while(display.length < 5 && i < data.length){
    let score = data[i].score;
    let tied = data.filter(p=>p.score === score);

    if(tied.length > 1 && display.length === 0){
      display.push(`${tied.length} people tied for 1st`);
      break;
    }

    tied.forEach(p=>{
      if(display.length < 5){
        display.push(`${p.name} — ${p.score}`);
      }
    });

    i += tied.length;
  }

  display.forEach(text=>{
    div.innerHTML += `<div class="entry">${text}</div>`;
  });
});

  clean.forEach((p,index)=>{
    div.innerHTML+=`
      <div class="entry">
        <span class="rank">#${index+1}</span>
        <span class="name">${p.name}</span>
        <span class="score">${p.score}</span>
      </div>
    `;
  });
});

socket.on("WINNER", data=>{
  showOverlay(data);
  launchConfetti();
});

function showOverlay(data){
  const overlay = document.getElementById("winnerOverlay");

  document.getElementById("overlayCategory").innerText = data.category;
  document.getElementById("overlayWinner").innerText = data.winner;
  document.getElementById("overlayMost").innerText = data.mostChosen || "N/A";

  overlay.classList.remove("hidden");
  overlay.classList.add("fade-in");

  setTimeout(()=>{
    overlay.classList.remove("fade-in");
    overlay.classList.add("fade-out");

    setTimeout(()=>{
      overlay.classList.add("hidden");
      overlay.classList.remove("fade-out");
    },1000);

  },10000);
}

function launchConfetti(){
  confetti({
    particleCount: 250,
    spread: 130,
    origin: { y: 0.6 }
  });
}

function changeSize(direction){
  fontScale += direction * 0.1;
  document.documentElement.style.setProperty('--scale', fontScale);
}
</script>
<div class="bottom-images">
  <img src="images/left.png">
  <img class="center" src="images/center.png">
  <img src="images/right.png">
</div>
</body>
</html>
