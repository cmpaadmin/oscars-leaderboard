<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Oscars Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="tabulatingMessage">
    VOTES ARE BEING TABULATED<span id="dots"></span>
  </div>

  <div id="leaderboard"></div>

  <div id="winnerOverlay">
    <div class="overlay-content" id="overlayContent">
      <div id="overlayCategory"></div>

      <div class="overlay-section-title" id="winnerTitle">Winner</div>
      <div id="overlayWinner"></div>

      <div class="overlay-section-title" id="mostTitle">Most Chosen</div>
      <div id="overlayMost"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    const socket = io();
    let dotCount = 0;
    let overlayTimer = null;

    setInterval(() => {
      const dots = document.getElementById("dots");
      if (!dots) return;
      dotCount = (dotCount + 1) % 4;
      dots.textContent = ".".repeat(dotCount);
    }, 500);

    socket.on("INIT", (payload) => {
      if (!payload) return;
      const started = Object.keys(payload.winners || {}).length > 0;
      if (started) {
        renderLeaderboard(payload.leaderboard || []);
      } else {
        showTabulating();
      }
    });

    socket.on("LEADERBOARD", (payload) => {
      if (!payload) return;

      if (!payload.started) {
        showTabulating();
        return;
      }

      renderLeaderboard(payload.data || []);
    });

    socket.on("WINNER", (data) => {
      showOverlay(data);
      launchConfetti();
    });

    socket.on("RESET", () => {
      showTabulating();
      const div = document.getElementById("leaderboard");
      if (div) div.innerHTML = "";
      const overlay = document.getElementById("winnerOverlay");
      if (overlay) overlay.style.display = "none";
    });

    window.addEventListener("resize", () => {
      const overlay = document.getElementById("winnerOverlay");
      if (overlay && overlay.style.display === "block") {
        fitOverlayText();
      }
    });

    function showTabulating() {
      const tab = document.getElementById("tabulatingMessage");
      const div = document.getElementById("leaderboard");
      if (tab) tab.style.display = "block";
      if (div) div.innerHTML = "";
    }

    function renderLeaderboard(data) {
      const tab = document.getElementById("tabulatingMessage");
      if (tab) tab.style.display = "none";

      const div = document.getElementById("leaderboard");
      if (!div) return;
      div.innerHTML = "";

      if (!data || data.length === 0) return;

      const grouped = {};
      data.forEach((player) => {
        const score = Number(player.score) || 0;
        if (!grouped[score]) grouped[score] = [];
        grouped[score].push(player.name);
      });

      const scores = Object.keys(grouped)
        .map(Number)
        .sort((a, b) => b - a);

      let rank = 1;
      let visibleLines = 0;
      const maxLines = 5;

      scores.forEach((score) => {
        if (visibleLines >= maxLines) return;

        const players = grouped[score];
        const currentRank = rank;
        const leaderClass = currentRank === 1 ? "entry leader" : "entry";

        if (players.length > 3) {
          if (visibleLines < maxLines) {
            div.innerHTML += `
              <div class="${leaderClass}">
                <span class="rank">#${currentRank}</span>
                <span>${players.length} people tied</span>
                <span> ${score}</span>
              </div>
            `;
            visibleLines += 1;
          }
        } else if (players.length === 1) {
          if (visibleLines < maxLines) {
            div.innerHTML += `
              <div class="${leaderClass}">
                <span class="rank">#${currentRank}</span>
                <span>${players[0]}</span>
                <span> ${score}</span>
              </div>
            `;
            visibleLines += 1;
          }
        } else {
          players.forEach((name, index) => {
            if (visibleLines >= maxLines) return;

            div.innerHTML += `
              <div class="${leaderClass} tie-line ${index > 0 ? "tie-subline" : ""}">
                <span class="rank">${index === 0 ? "#" + currentRank : ""}</span>
                <span>${name}</span>
                <span> ${score}</span>
              </div>
            `;

            visibleLines += 1;
          });
        }

        rank += players.length;
      });
    }

    function showOverlay(data) {
      const overlay = document.getElementById("winnerOverlay");
      if (!overlay) return;

      document.getElementById("overlayCategory").textContent = data?.category || "";
      document.getElementById("overlayWinner").textContent = data?.winner || "";
      document.getElementById("overlayMost").textContent = data?.mostChosen || "N/A";

      overlay.style.display = "block";

      requestAnimationFrame(() => {
        fitOverlayText();
      });

      if (overlayTimer) clearTimeout(overlayTimer);
      overlayTimer = setTimeout(() => {
        overlay.style.display = "none";
      }, 10000);
    }

    function fitOverlayText() {
      const box = document.getElementById("overlayContent");
      const category = document.getElementById("overlayCategory");
      const winnerTitle = document.getElementById("winnerTitle");
      const winner = document.getElementById("overlayWinner");
      const mostTitle = document.getElementById("mostTitle");
      const most = document.getElementById("overlayMost");

      if (!box || !category || !winnerTitle || !winner || !mostTitle || !most) return;

      category.style.maxWidth = "92%";
      winnerTitle.style.maxWidth = "92%";
      winner.style.maxWidth = "92%";
      mostTitle.style.maxWidth = "92%";
      most.style.maxWidth = "92%";

      category.style.lineHeight = "1.05";
      winner.style.lineHeight = "1.05";
      most.style.lineHeight = "1.05";

      category.style.fontSize = "38px";
      winnerTitle.style.fontSize = "24px";
      mostTitle.style.fontSize = "24px";
      winner.style.fontSize = "40px";
      most.style.fontSize = "40px";

      const maxHeight = box.clientHeight * 0.9;
      let guard = 0;

      while (box.scrollHeight < maxHeight && guard < 200) {
        category.style.fontSize = (parseFloat(category.style.fontSize) + 2) + "px";
        winnerTitle.style.fontSize = (parseFloat(winnerTitle.style.fontSize) + 1) + "px";
        mostTitle.style.fontSize = (parseFloat(mostTitle.style.fontSize) + 1) + "px";
        winner.style.fontSize = (parseFloat(winner.style.fontSize) + 3) + "px";
        most.style.fontSize = (parseFloat(most.style.fontSize) + 3) + "px";
        guard++;
      }

      while (box.scrollHeight > maxHeight && guard < 400) {
        category.style.fontSize = Math.max(24, parseFloat(category.style.fontSize) - 1) + "px";
        winnerTitle.style.fontSize = Math.max(18, parseFloat(winnerTitle.style.fontSize) - 1) + "px";
        mostTitle.style.fontSize = Math.max(18, parseFloat(mostTitle.style.fontSize) - 1) + "px";
        winner.style.fontSize = Math.max(26, parseFloat(winner.style.fontSize) - 1) + "px";
        most.style.fontSize = Math.max(26, parseFloat(most.style.fontSize) - 1) + "px";
        guard++;
      }
    }

    function launchConfetti() {
      const end = Date.now() + 10000;

      (function frame() {
        confetti({
          particleCount: 6,
          angle: 60,
          spread: 70,
          origin: { x: 0 },
          zIndex: 9999
        });

        confetti({
          particleCount: 6,
          angle: 120,
          spread: 70,
          origin: { x: 1 },
          zIndex: 9999
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }
  </script>
</body>
</html>
