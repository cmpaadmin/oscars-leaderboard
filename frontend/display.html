<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Oscars Leaderboard</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div id="tabulatingMessage">
VOTES ARE BEING TABULATED<span id="dots"></span>
</div>

<div id="leaderboard"></div>

<div id="winnerOverlay">
<div class="overlay-content">

<div id="overlayCategory"></div>

<div>
Winner: <span id="overlayWinner"></span>
</div>

<div>
Most Chosen: <span id="overlayMost"></span>
</div>

</div>
</div>


<script src="/socket.io/socket.io.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>


<script>

const socket = io();

let dotCount = 0;


/* animated dots */

setInterval(()=>{

const dots = document.getElementById("dots");

dotCount = (dotCount+1)%4;

dots.innerText = ".".repeat(dotCount);

},500);



/* leaderboard updates */

socket.on("LEADERBOARD",(payload)=>{

if(!payload.started) return;

const data = payload.data;

document.getElementById("tabulatingMessage").style.display="none";

const div = document.getElementById("leaderboard");

div.innerHTML="";

if(!data || data.length===0) return;


/* group ties */

const grouped = {};

data.forEach(player=>{

if(!grouped[player.score]) grouped[player.score]=[];

grouped[player.score].push(player.name);

});


const scores = Object.keys(grouped)
.map(Number)
.sort((a,b)=>b-a);


let rank = 1;

scores.forEach(score=>{

const players = grouped[score];

if(rank>5) return;


/* many tied */

if(players.length>3){

const leaderClass = rank===1 ? "entry leader" : "entry";

div.innerHTML += `
<div class="${leaderClass}">
<span class="rank">#${rank}</span>
<span>${players.length} people tied</span>
<span> ${score}</span>
</div>
`;

rank++;

}

/* few tied */

else{

players.forEach(name=>{

if(rank<=5){

const leaderClass = rank===1 ? "entry leader" : "entry";

div.innerHTML += `
<div class="${leaderClass}">
<span class="rank">#${rank}</span>
<span>${name}</span>
<span> ${score}</span>
</div>
`;

rank++;

}

});

}

});

});



/* winner popup */

socket.on("WINNER",(data)=>{

showOverlay(data);

launchConfetti();

});



/* reset event */

socket.on("RESET",()=>{

location.reload();

});



/* popup */

function showOverlay(data){

const overlay = document.getElementById("winnerOverlay");

document.getElementById("overlayCategory").innerText = data.category;
document.getElementById("overlayWinner").innerText = data.winner;
document.getElementById("overlayMost").innerText = data.mostChosen || "N/A";

overlay.style.display="block";

setTimeout(()=>{

overlay.style.display="none";

},10000);

}



/* continuous confetti */

function launchConfetti(){

const duration = 10000;

const end = Date.now() + duration;

(function frame(){

confetti({
particleCount:6,
angle:60,
spread:70,
origin:{x:0},
zIndex:9999
});

confetti({
particleCount:6,
angle:120,
spread:70,
origin:{x:1},
zIndex:9999
});

if(Date.now() < end){
requestAnimationFrame(frame);
}

})();

}

</script>

</body>
</html>
